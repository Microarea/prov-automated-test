name: tests
on: [push, pull_request]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/api-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm i -g newman newman-reporter-htmlextra
      - run: bash newman/run-api.sh collections/users.postman_collection.json environments/dev.postman_environment.json
      - uses: actions/upload-artifact@v4
        with:
          name: api-reports
          path: tests/api-tests/newman/reports

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/ui-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm i
      - run: npx playwright install --with-deps
      - run: npm run smoke
      - uses: actions/upload-artifact@v4
        with:
          name: ui-reports
          path: tests/ui-tests/reports